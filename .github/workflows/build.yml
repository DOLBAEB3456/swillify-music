name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --user --upgrade Cython==0.29.33 virtualenv
          pip install --user buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          buildozer init
          sed -i 's/title = .*/title = SWILLify/' buildozer.spec
          sed -i 's/package.name = .*/package.name = swillify/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.swillify/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3==3.10.12,kivy==2.3.0,yt-dlp,requests,Cython==0.29.33/' buildozer.spec
          sed -i 's/android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SWILLify-APK
          path: bin/*.apk
