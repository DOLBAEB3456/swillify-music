name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer

      - name: Configure Buildozer
        run: |
          buildozer init
          # Основные настройки
          sed -i 's/^title = .*/title = SWILLify/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = swillify/' buildozer.spec
          sed -i 's/^package.domain = .*/package.domain = org.swillify/' buildozer.spec
          sed -i 's/^source.dir = .*/source.dir = ./' buildozer.spec
          sed -i 's/^source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas/' buildozer.spec
          sed -i 's/^version = .*/version = 1.0.0/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3==3.10.12,kivy==2.3.0,yt-dlp,requests/' buildozer.spec
          sed -i 's/^android.permissions = .*/android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 30/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^android.accept_sdk_license = .*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^log_level = .*/log_level = 2/' buildozer.spec

      - name: Build APK
        run: |
          export LANG=en_US.UTF-8
          # Автоматически принимаем все лицензии
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SWILLify-APK
          path: bin/*.apk
